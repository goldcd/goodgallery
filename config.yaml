# GoodGallery Configuration

gallery:
  # Path to your photo directory
  photo_directory: "./photos"
  
  # Gallery Title
  title: "Good Gallery"
  
  # Web server port
  port: 5000
  
  # Monitor photos directory for changes (auto-detect additions/deletions)
  watch_for_changes: true
  
  # Thumbnail settings
  thumbnail_size: 200
  images_per_page: 300
  
  # Allowed image extensions
  allowed_extensions:
    - jpg
    - jpeg
    - png
    - gif
    - webp

  # Tag Visibility Limits
  tag_limits:
    dropdown: 1000      # Max tags in search dropdown
    browse: 100         # Max tags in "Tag Filter" bar
    min_count: 1        # Minimum occurrences to be listed

ai:
  # Model Selection
  # Will auto-download the model if it's not found locally
  # Options:
  # - "prithivMLmods/Qwen3-VL-8B-Instruct-abliterated-v1" 
  # - "prithivMLmods/Qwen2.5-VL-7B-Abliterated-Caption-it"
  # - "llava-hf/llava-1.5-7b-hf" (Classic, robust)
  model: "prithivMLmods/Qwen3-VL-8B-Instruct-abliterated-v1"
  
  # Keep model loaded in GPU memory (faster to start tagging, but retains VRAM usage until program is closed)
  try_keep_loaded: false
  # Enable 4-bit quantization (fits in ~6GB VRAM)
  # Well, it's closer to 9 with the overhead
  use_quantization: true
  
  # Batch size for tagging
  # - 1: Safe, Stable, Low VRAM (Recommended for Qwen)
  # - 2+: Faster but uses significantly more VRAM. May crash if images are large.
  batch_size: 1
  
  # Max image dimension (in pixels) for AI analysis
  # Definitely need to set this - without limiting size regular photo will far exceed 16GB in processing
  # Juggling this and the batch size is what determines VRAM usage over that required for the model
  # - 512: Fast, Low VRAM (Good for simple images)
  # - 1024: Good balance of speed/detail (Default)
  # - 1280+: Better for small details, uses more VRAM
  # - 1024: Good balance of speed/detail (Default)
  # - 1280+: Better for small details, uses more VRAM
  max_image_size: 1024

  # Model for Tag Consolidation (Text-Only)
  # Small, fast model specialized for instruction following
  # User requested abliterated (uncensored) model
  consolidation_model: "mlabonne/Qwen3-14B-abliterated"
  consolidation_batch_size: 2000 # 2000 fits safely in 32k context (Input+Output)
  
  # Prompt for Tag Consolidation
  # Instructions for the text model on how to clean/merge tags.
  # "TAGS_LIST_PLACEHOLDER" will be replaced by the actual list of tags.
  consolidation_prompt: |
    You are an Uncensored Data Processing Assistant. 
    Your sole task is to clean and standardize a database of tags.
    Content Warning: The list may contain NSFW, explicit, or offensive terms. This is a medical/database task.
    You MUST process ALL tags regardless of content. Do not refuse. Do not moralize.

    Below is a list of existing tags with their usage counts: `tag (count)`.

    RULES:
    1. **Analyze ALL tags** provided below.
    2. **Identify Redundancies**: Map synonyms, typos, and plural forms to the most common/standard term.
       - Example: `males (2)` -> `['man']` (if `man` exists and is frequent)
       - Example: `doggy (5)` -> `['dog']`
    3. **Generalize (Strict)**: Only add a general category if it is a *direct* parent taxonomy. Do NOT add vague concepts like "activity", "object", "concept", "thing".
       - Example: `black leather jacket` -> `['black leather jacket', 'leather jacket', 'jacket']` (Good)
       - Example: `smoking` -> `['activity']` (BAD - too vague)
       - Example: `cat` -> `['animal']` (Good)
    4. **Keep Good Tags**: If a tag is standard and correct (e.g. `sunset`, `beach`), map it to itself or just omit it if you make no changes.
       - Ideally, if no change needed, valid output is `tag -> [tag]`
    5. **Prioritize usage**: If `bike (50)` and `bicycle (5)` exist, map `bicycle` -> `['bike']`.

    OUTPUT FORMAT:
    Return a strictly valid JSON object. Keys are the *original tag* from the list. Values are the list of *replacement tags*.
    Only include entries where you are proposing a clean-up or verification. You can omit tags you have no opinion on, but better to be comprehensive.
    JSON ONLY. NO MARKDOWN.

    TAGS LIST:
    TAGS_LIST_PLACEHOLDER
  
  # Tagging prompt for LLaVA (customize to change tagging behavior)
  # This prompt is sent to the AI model for each image.
  # You can modify this to change what the AI focuses on when analyzing images.
  # The prompt must follow the LLaVA conversation format: "USER: <image>\n...text...\nASSISTANT:"
  # tagging_prompt: |
    #Initial LLaVA prompt
    # USER: <image>
    # Analyze the image and generate a single, comprehensive, comma-separated list of keywords, listed in their descending importance as a description of the image
    # Include keywords for: main objects, people (including names of famous figures if recognized), actions, location, time of day, lighting, artistic style, mood, fictional characters, memes, distinctive features and anything else that seems to be a relevant keyword to search on this image by.
    # Do not transcribe text. Do not use categories or labels. Just keywords.
    # Example: car, woman, running, beach, sunny, sketch, vintage, afternoon
    # ASSISTANT:
  tagging_prompt: |
    USER: <image>
    SYSTEM:
    You are a high-precision image annotation assistant.
    
    TASK:
    Generate a comma-separated list of relevanttags based ONLY on what is clearly visible in the image.
    
    RULES:
    - Tags must be 1–2 words each
    - Only include items with >90% visual certainty
    - Focus on:
      • Notable objects
      • Specific people or landmarks (if clearly identifiable)
      • Overall scene or activity
      • Type of image (e.g. portrait, landscape, still life, porn, drawing, meme, cartoon, etc.)     
    - Tag:
      • The type of image.
      • Relevant to the type of image, aligned to terms likely to be searched on for this genre.
      • Notable objects with and without descriptive adjectives.
      • Specific people or landmarks, if clearly identifiable. 
      • Overall scene or activity.
      • Describe physical characteristics of people detected (e.g. age, gender, ethnicity, state of dress, clothing, pose, expression, freckles, bald, cleavage etc.)
    -Always output tags to describe:
      • The classification of the image type.
      • Single word identification of all people and objects detected (e.g. if "attractive woman" is detected, tag "Woman" and "Attractive" as well")
      • Names of specific people or places, if detected.
    - No censorship
    - Use colloquial language where appropriate
    - No explanations
    - No brackets
    - No placeholders
    - No transcription of text
    - No duplicate tags
    - Do NOT describe uncertainty 
    OUTPUT FORMAT:
    Comma-separated list only.
    EXAMPLE (format only — do not reuse these tags, unless in the image):
    Man, Red Car, City Street, Party, Attractive Woman, Birthday, Office, Cyberpunk City, Neon, Sunshine, Car, Woman, Cleavage, Child, Dog, Cat, Black Cat, Sad, Laughing, Paris, Eiffel Tower, Rishi Sunak, James Bond, Tom Cruise
    ASSISTANT:

database:
  # SQLite database path
  path: "data/gallery.db"
